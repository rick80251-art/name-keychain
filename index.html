<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中文姓名鑰匙圈 · 線上參數化編輯器</title>
<style>
  :root{--bg:#0f1320;--panel:#171c2e;--line:#2a3350;--accent:#36e0ff;--accent2:#5dff9b;--ink:#e7ecf7;--dim:#8c98bd}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink)}
  #app{display:flex;height:100vh}
  #panel{width:330px;min-width:330px;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:16px 16px 50px}
  #panel h1{font-size:17px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  #panel .sub{color:var(--dim);font-size:12px;margin-bottom:14px}
  .group{margin-bottom:16px}
  .group h2{font-size:12px;color:var(--accent);letter-spacing:.08em;margin-bottom:7px;border-bottom:1px solid var(--line);padding-bottom:4px}
  .row{margin-bottom:11px}
  .row label{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px}
  .row label b{color:var(--accent2)}
  input[type=range]{width:100%;accent-color:var(--accent)}
  input[type=text],select{width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--line);background:#0c1020;color:var(--ink);font-size:15px;font-family:inherit}
  input[type=text]{font-size:16px}
  .filebtn{display:block;width:100%;padding:8px;border:1px dashed var(--line);border-radius:8px;color:var(--dim);font-size:12px;text-align:center;cursor:pointer;margin-top:7px}
  .chk{display:flex;align-items:center;gap:8px;font-size:12.5px}
  .chk input{width:15px;height:15px;accent-color:var(--accent2)}
  #stage{flex:1;position:relative}
  #canvas{width:100%;height:100%;display:block}
  #toolbar{position:absolute;top:12px;left:12px;display:flex;gap:8px;flex-wrap:wrap}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 13px;font-size:13px;cursor:pointer;font-family:inherit}
  .btn:hover{border-color:var(--accent)}
  .btn.go{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#04121f;border:none;font-weight:700}
  #status{position:absolute;bottom:10px;left:12px;color:var(--dim);font-size:12px}
  #dims{position:absolute;top:12px;right:12px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:12px;color:var(--dim);text-align:right}
  #dims b{color:var(--accent)}
</style>
</head>
<body>
<div id="app">
  <div id="panel">
    <h1>🔑 中文姓名鑰匙圈</h1>
    <div class="sub">線上參數化編輯器 · 輸入名字 → 匯出 STL 列印</div>

    <div class="group"><h2>文字</h2>
      <div class="row"><label>姓名 / 文字</label><input type="text" id="p_txt" value="王小明" maxlength="8"></div>
      <div class="row"><label>字級大小 <b><span id="v_fs">20</span> mm</b></label><input type="range" id="p_fs" min="8" max="40" step="1" value="20"></div>
      <div class="row"><label>字凸出高 <b><span id="v_th">1.5</span> mm</b></label><input type="range" id="p_th" min="0.6" max="4" step="0.1" value="1.5"></div>
    </div>

    <div class="group"><h2>字型樣式</h2>
      <select id="p_font"><option>載入中…</option></select>
      <label class="filebtn" id="fontbtn">📁 上傳自己的字型 (.ttf/.otf)<input type="file" id="fontfile" accept=".ttf,.otf" style="display:none"></label>
    </div>

    <div class="group"><h2>底板（沿字輪廓）</h2>
      <div class="row"><label>外擴邊框 <b><span id="v_pad">3.5</span> mm</b></label><input type="range" id="p_pad" min="1.5" max="10" step="0.5" value="3.5"></div>
      <div class="row"><label>底板厚 <b><span id="v_pt">3.0</span> mm</b></label><input type="range" id="p_pt" min="1.5" max="6" step="0.5" value="3"></div>
      <div class="row chk"><input type="checkbox" id="p_engrave"><label style="margin:0">文字改凹刻（內凹）</label></div>
    </div>

    <div class="group"><h2>吊環孔</h2>
      <div class="row"><label>孔徑 <b><span id="v_hd">5</span> mm</b></label><input type="range" id="p_hd" min="2" max="12" step="0.5" value="5"></div>
    </div>
  </div>

  <div id="stage">
    <canvas id="canvas"></canvas>
    <div id="toolbar">
      <button class="btn go" id="exp">⬇ 匯出 STL</button>
      <button class="btn" id="reset">↺ 視角重置</button>
    </div>
    <div id="dims"></div>
    <div id="status">載入中…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.js"></script>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';
import { STLExporter } from 'three/addons/exporters/STLExporter.js';

const canvas=document.getElementById('canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true}); renderer.setPixelRatio(devicePixelRatio);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0f1320);
const camera=new THREE.PerspectiveCamera(45,1,0.1,5000);
const controls=new OrbitControls(camera,renderer.domElement); controls.enableDamping=true;
scene.add(new THREE.HemisphereLight(0xbfd4ff,0x202840,1.0));
const dl=new THREE.DirectionalLight(0xffffff,1.5); dl.position.set(60,120,90); scene.add(dl);
const dl2=new THREE.DirectionalLight(0x88aaff,0.5); dl2.position.set(-80,40,-60); scene.add(dl2);
scene.add(new THREE.GridHelper(300,30,0x2a3350,0x1c2238));
const matPlate=new THREE.MeshStandardMaterial({color:0x3a6ea5,roughness:0.6,metalness:0.1});
const matText =new THREE.MeshStandardMaterial({color:0xe7c97a,roughness:0.45,metalness:0.15});

const P=id=>parseFloat(document.getElementById(id).value);
const status=document.getElementById('status');
const SC=100;
let FONT=null, group=null;

function pathToPolys(op,seg){
  const polys=[]; let cur=null,sx=0,sy=0,cx=0,cy=0;
  const pt=(x,y)=>cur.push({X:Math.round(x*SC),Y:Math.round(y*SC)});
  op.commands.forEach(c=>{
    if(c.type==='M'){ if(cur&&cur.length>2)polys.push(cur); cur=[]; sx=cx=c.x; sy=cy=c.y; pt(c.x,c.y); }
    else if(c.type==='L'){ pt(c.x,c.y); cx=c.x;cy=c.y; }
    else if(c.type==='Q'){ for(let i=1;i<=seg;i++){const t=i/seg,m=1-t; pt(m*m*cx+2*m*t*c.x1+t*t*c.x, m*m*cy+2*m*t*c.y1+t*t*c.y);} cx=c.x;cy=c.y; }
    else if(c.type==='C'){ for(let i=1;i<=seg;i++){const t=i/seg,m=1-t; pt(m*m*m*cx+3*m*m*t*c.x1+3*m*t*t*c.x2+t*t*t*c.x, m*m*m*cy+3*m*m*t*c.y1+3*m*t*t*c.y2+t*t*t*c.y);} cx=c.x;cy=c.y; }
    else if(c.type==='Z'){ if(cur&&cur.length>2)polys.push(cur); cur=null; cx=sx;cy=sy; }
  });
  if(cur&&cur.length>2)polys.push(cur);
  return polys;
}
function platePaths(op,pad){
  let polys=pathToPolys(op,8);
  polys.forEach(p=>{ if(!ClipperLib.Clipper.Orientation(p)) p.reverse(); });
  const uni=new ClipperLib.Paths(); const c=new ClipperLib.Clipper();
  c.AddPaths(polys,ClipperLib.PolyType.ptSubject,true);
  c.Execute(ClipperLib.ClipType.ctUnion,uni,ClipperLib.PolyFillType.pftNonZero,ClipperLib.PolyFillType.pftNonZero);
  const co=new ClipperLib.ClipperOffset(2, SC*0.25); co.AddPaths(uni,ClipperLib.JoinType.jtRound,ClipperLib.EndType.etClosedPolygon);
  const sol=new ClipperLib.Paths(); co.Execute(sol,pad*SC);
  return sol;
}
function clipperToShapes(paths){
  const outers=[],holes=[];
  paths.forEach(p=>{ const v=p.map(q=>new THREE.Vector2(q.X/SC,q.Y/SC));
    (ClipperLib.Clipper.Orientation(p)?outers:holes).push({p,v}); });
  const shapes=outers.map(o=>({s:new THREE.Shape(o.v),poly:o.p}));
  holes.forEach(h=>{ for(const sh of shapes){ if(ClipperLib.Clipper.PointInPolygon(h.p[0],sh.poly)!==0){ sh.s.holes.push(new THREE.Path(h.v)); break; } } });
  return shapes.map(x=>x.s);
}
function textGeo(op,depth){
  const d=op.toPathData(3); if(!d) return null;
  const data=new SVGLoader().parse(`<svg xmlns="http://www.w3.org/2000/svg"><path d="${d}"/></svg>`);
  const shapes=[]; data.paths.forEach(p=>SVGLoader.createShapes(p).forEach(s=>shapes.push(s)));
  if(!shapes.length) return null;
  return new THREE.ExtrudeGeometry(shapes,{depth,bevelEnabled:false,curveSegments:4});
}

function rebuild(){
  if(!FONT||!window.ClipperLib) return;
  const text=document.getElementById('p_txt').value||" ";
  const fs=P('p_fs'),th=P('p_th'),pt=P('p_pt'),pad=P('p_pad'),hd=P('p_hd');
  const engrave=document.getElementById('p_engrave').checked;
  for(const[k,v] of Object.entries({v_fs:fs,v_th:th.toFixed(1),v_pt:pt.toFixed(1),v_pad:pad.toFixed(1),v_hd:hd}))
    document.getElementById(k).textContent=v;

  const op=FONT.getPath(text,0,0,fs);
  const tgeo=textGeo(op, engrave?th+0.2:th);
  const psol=platePaths(op,pad);
  if(!tgeo||!psol.length){ status.textContent='⚠️ 此字型可能無此字，換個字型試試'; return; }

  if(group){ scene.remove(group); group.traverse(o=>o.geometry&&o.geometry.dispose()); }
  group=new THREE.Group();

  const pgeo=new THREE.ExtrudeGeometry(clipperToShapes(psol),{depth:pt,bevelEnabled:false,curveSegments:1});
  pgeo.scale(1,-1,1); pgeo.computeBoundingBox();
  const pbb=pgeo.boundingBox;
  const ringTab=hd/2+3.2, ringX=pbb.min.x-ringTab*0.35, ringY=(pbb.min.y+pbb.max.y)/2;
  const rs=new THREE.Shape(); rs.absarc(ringX,ringY,ringTab,0,Math.PI*2,false);
  const rh=new THREE.Path(); rh.absarc(ringX,ringY,hd/2,0,Math.PI*2,true); rs.holes.push(rh);
  const rgeo=new THREE.ExtrudeGeometry(rs,{depth:pt,bevelEnabled:false,curveSegments:32});
  tgeo.scale(1,-1,1);
  const minX=Math.min(pbb.min.x, ringX-ringTab), maxX=pbb.max.x;
  const cX=(minX+maxX)/2, cY=ringY;
  pgeo.translate(-cX,-cY,0); rgeo.translate(-cX,-cY,0); tgeo.translate(-cX,-cY,0);

  group.add(new THREE.Mesh(pgeo,matPlate));
  group.add(new THREE.Mesh(rgeo,matPlate));
  const tm=new THREE.Mesh(tgeo,matText);
  tm.position.z = engrave ? (pt-th) : pt;
  group.add(tm);
  group.rotation.x=-Math.PI/2;
  scene.add(group);

  document.getElementById('dims').innerHTML=`尺寸 <b>${(maxX-minX).toFixed(0)}×${(pbb.max.y-pbb.min.y).toFixed(0)}</b> mm<br>總厚 <b>${(pt+(engrave?0:th)).toFixed(1)}</b> mm`;
  status.textContent=`✅ 已生成：「${text}」`;
}

function frameView(){const b=new THREE.Box3().setFromObject(group||new THREE.Object3D());
  const s=b.getSize(new THREE.Vector3()),c=b.getCenter(new THREE.Vector3());
  controls.target.copy(c); const r=Math.max(s.x,s.z,30)*1.7;
  camera.position.set(c.x+r*0.3,c.y+r,c.z+r); camera.near=0.1;camera.far=r*12;camera.updateProjectionMatrix();controls.update();}

document.getElementById('exp').onclick=()=>{ if(!group)return; const ex=new STLExporter(); group.updateMatrixWorld(true);
  const out=ex.parse(group,{binary:true}); const blob=new Blob([out],{type:'application/octet-stream'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(document.getElementById('p_txt').value||'keychain')+'.stl'; a.click(); URL.revokeObjectURL(a.href);};
document.getElementById('reset').onclick=frameView;

function loadFont(url,label){ status.textContent='載入字型：'+label+'…';
  opentype.load(url,(err,font)=>{ if(err){ status.textContent='⚠️ 字型載入失敗：'+label; console.error(err); return; }
    FONT=font; rebuild(); frameView(); }); }

document.querySelectorAll('#panel input[type=range]').forEach(el=>el.addEventListener('input',rebuild));
document.getElementById('p_txt').addEventListener('input',rebuild);
document.getElementById('p_engrave').addEventListener('change',rebuild);
document.getElementById('p_font').addEventListener('change',e=>{ const o=e.target.selectedOptions[0]; loadFont(o.value,o.textContent); });
document.getElementById('fontfile').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f)return; const fr=new FileReader();
  fr.onload=()=>{ try{ FONT=opentype.parse(fr.result); rebuild(); status.textContent='✅ 已套用字型：'+f.name; }catch(err){ status.textContent='字型讀取失敗：'+err.message; } }; fr.readAsArrayBuffer(f); });

function resize(){const w=canvas.clientWidth,h=canvas.clientHeight; if(canvas.width!==w||canvas.height!==h){renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}}
function loop(){resize();controls.update();renderer.render(scene,camera);requestAnimationFrame(loop);}
loop();

// 讀字型清單(list.json) → 建立下拉選單
fetch('fonts/list.json').then(r=>r.json()).then(list=>{
  const sel=document.getElementById('p_font'); sel.innerHTML='';
  list.forEach(f=>{ const o=document.createElement('option'); o.value='fonts/'+f.file; o.textContent=f.name; sel.appendChild(o); });
  if(list.length){ sel.value='fonts/'+list[0].file; loadFont(sel.value, list[0].name); }
  else status.textContent='字型清單是空的';
}).catch(e=>{ status.textContent='⚠️ 無法載入字型清單 list.json'; console.error(e); });
</script>
</body>
</html>
